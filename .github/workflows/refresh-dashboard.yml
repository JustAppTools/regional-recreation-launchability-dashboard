name: Refresh dashboard data

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Regenerate dashboard data
        run: python scripts/run_all.py

      - name: Commit refreshed generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw/ data/processed/ docs/data/ outputs/figures/launch_status_chart.png

          if git diff --cached --quiet; then
            echo "No refreshed generated files changed."
          else
            git commit -m "Refresh dashboard data"
            git push
          fi

